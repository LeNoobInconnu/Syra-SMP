<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Fond d'écran</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      background-image: url("Site internet en développement"); /* mets ici le lien ou le nom de ton image */
      background-size: cover;      /* couvre tout l'écran */
      background-position: center; /* centre l'image */
      background-repeat: no-repeat;
      background-color: #000;      /* couleur de fond si l'image ne charge pas */
    }
  </style>
</head>
<body>
</body>
</html>
